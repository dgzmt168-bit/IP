<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今日内容创作</title>
<!-- Google Fonts 在大陆被墙，去掉避免占用连接，改用系统字体 -->
<style>
  :root {
    --ink: #1a1a18;
    --ink-2: #4a4a45;
    --ink-3: #8a8a82;
    --paper: #f7f5f0;
    --paper-2: #eeece6;
    --accent: #c4621a;
    --accent-light: #f5e8dc;
    --blue: #3d5afe;
    --blue-light: #e8f0fe;
    --border: rgba(26,26,24,0.12);
    --serif: 'PingFang SC', 'Hiragino Sans GB', STSong, serif;
    --sans: 'PingFang SC', 'Hiragino Sans GB', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--paper); color: var(--ink); font-family: var(--sans); font-weight: 300; min-height: 100vh; }

  /* Header */
  .header { padding: 2.5rem 2rem 1.5rem; max-width: 640px; margin: 0 auto; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; }
  .header-eyebrow { font-size: 11px; letter-spacing: 0.15em; color: var(--accent); margin-bottom: 8px; font-weight: 400; text-transform: uppercase; }
  .header h1 { font-family: var(--serif); font-size: 22px; font-weight: 600; }
  .header-date { font-size: 12px; color: var(--ink-3); margin-top: 4px; }
  .back-link { font-size: 12px; color: var(--ink-3); text-decoration: none; border: 1px solid var(--border); border-radius: 6px; padding: 7px 12px; white-space: nowrap; flex-shrink: 0; transition: all 0.2s; margin-top: 4px; }
  .back-link:hover { color: var(--accent); border-color: var(--accent); }
  .feedback-link { font-size: 13px; color: var(--accent) !important; border-color: var(--accent); font-weight: 500; }
  .feedback-link:hover { background: var(--accent); color: white !important; }

  .main { max-width: 640px; margin: 0 auto; padding: 1.5rem 2rem 5rem; }

  /* IP mini card */
  .ip-mini-card { background: white; border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; margin-bottom: 1.5rem; }
  .ip-mini-header { display: flex; align-items: center; justify-content: space-between; cursor: pointer; gap: 10px; }
  .ip-mini-label { font-size: 11px; color: var(--accent); font-weight: 500; letter-spacing: 0.08em; margin-bottom: 3px; }
  .ip-mini-name { font-size: 14px; font-weight: 500; }
  .ip-mini-toggle { font-size: 12px; color: var(--ink-3); flex-shrink: 0; }
  .ip-mini-body { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); display: none; }
  .ip-mini-body.open { display: block; }
  .ip-mini-pos { font-size: 13px; color: var(--ink-2); line-height: 1.7; margin-bottom: 8px; }
  .ip-mini-tags { display: flex; flex-wrap: wrap; gap: 5px; }
  .ip-mini-tag { font-size: 11px; padding: 3px 9px; border-radius: 20px; background: var(--accent-light); color: var(--accent); }

  .no-ip-notice { background: var(--blue-light); border-radius: 10px; padding: 14px 16px; margin-bottom: 1.5rem; font-size: 13px; color: var(--ink-2); line-height: 1.8; }
  .no-ip-notice a { color: var(--blue); text-decoration: none; font-weight: 500; }
  .no-ip-label { font-size: 12px; color: var(--ink-3); margin: 10px 0 5px; display: block; }
  .no-ip-textarea { width: 100%; background: white; border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font-family: var(--sans); font-size: 13px; font-weight: 300; color: var(--ink); outline: none; resize: none; min-height: 70px; line-height: 1.7; transition: border-color 0.2s; }
  .no-ip-textarea:focus { border-color: var(--blue); }

  /* Section */
  .section-head { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1rem; gap: 10px; }
  .section-title { font-family: var(--serif); font-size: 18px; font-weight: 600; }
  .section-sub { font-size: 13px; color: var(--ink-3); margin-top: 3px; }
  .btn-refresh { font-size: 12px; color: var(--ink-3); background: none; border: 1px solid var(--border); border-radius: 6px; padding: 7px 12px; cursor: pointer; font-family: var(--sans); transition: all 0.2s; flex-shrink: 0; margin-top: 2px; }
  .btn-refresh:hover { color: var(--accent); border-color: var(--accent); }
  .btn-refresh:disabled { opacity: 0.4; cursor: not-allowed; }

  /* News cards */
  .news-grid { display: flex; flex-direction: column; gap: 14px; }
  .news-card { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 16px; transition: border-color 0.2s, box-shadow 0.2s; }
  .news-card:hover { border-color: rgba(196,98,26,0.3); box-shadow: 0 2px 12px rgba(196,98,26,0.07); }
  .news-card-top { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
  .news-num { width: 26px; height: 26px; border-radius: 50%; background: var(--accent); color: white; font-size: 12px; font-weight: 500; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
  .news-body { flex: 1; min-width: 0; }
  .news-type-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: var(--ink-3); background: var(--paper-2); border-radius: 4px; padding: 2px 7px; margin-bottom: 7px; font-weight: 400; letter-spacing: 0.03em; }
  .news-title { font-size: 15px; font-weight: 500; color: var(--ink); line-height: 1.55; }
  .news-divider { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
  .news-meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .news-meta-item { background: var(--paper); border-radius: 8px; padding: 9px 11px; }
  .news-meta-label { font-size: 10px; color: var(--ink-3); letter-spacing: 0.08em; margin-bottom: 4px; font-weight: 500; }
  .news-meta-value { font-size: 12px; color: var(--ink-2); line-height: 1.6; }
  .news-outline-block { background: var(--paper); border-radius: 8px; padding: 10px 12px; margin-bottom: 12px; }
  .news-outline-label { font-size: 10px; color: var(--ink-3); letter-spacing: 0.08em; margin-bottom: 7px; font-weight: 500; }
  .news-outline-list { list-style: none; display: flex; flex-direction: column; gap: 5px; }
  .news-outline-list li { font-size: 12.5px; color: var(--ink-2); line-height: 1.6; padding-left: 14px; position: relative; }
  .news-outline-list li::before { content: '▸'; position: absolute; left: 0; color: var(--accent); font-size: 10px; top: 2px; }
  .news-hook-block { background: var(--accent-light); border-radius: 8px; padding: 10px 12px; border-left: 3px solid var(--accent); margin-bottom: 12px; }
  .news-hook-label { font-size: 10px; color: var(--accent); letter-spacing: 0.08em; margin-bottom: 4px; font-weight: 500; }
  .news-hook-text { font-size: 13px; color: var(--ink); line-height: 1.7; font-style: italic; }
  .news-angle-bar { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; color: var(--accent); background: var(--accent-light); border-radius: 20px; padding: 4px 10px; margin-bottom: 12px; font-weight: 500; }
  .btn-select { font-size: 13px; color: var(--accent); background: none; border: 1px solid var(--accent); border-radius: 8px; padding: 10px 14px; cursor: pointer; font-family: var(--sans); transition: all 0.2s; width: 100%; font-weight: 500; }
  .btn-select:hover, .btn-select:focus { background: var(--accent); color: white; }
  .news-realtime-tag { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; color: #e53935; background: #fff3f3; border: 1px solid #ffc7c7; border-radius: 4px; padding: 2px 7px; margin-left: 6px; vertical-align: middle; font-weight: 500; }
  .news-realtime-dot { width: 5px; height: 5px; border-radius: 50%; background: #e53935; animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

  /* Skeleton loading */
  .skel-card { background: white; border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 10px; }
  .skel-line { border-radius: 6px; background: linear-gradient(90deg, var(--paper-2) 25%, #e5e3dc 50%, var(--paper-2) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; }
  @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

  /* Feeling section */
  .feeling-section { animation: fadeUp 0.35s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .selected-topic-card { background: var(--accent-light); border: 1px solid rgba(196,98,26,0.2); border-radius: 10px; padding: 12px 16px; margin-bottom: 1.25rem; }
  .stc-label { font-size: 11px; color: var(--accent); font-weight: 500; margin-bottom: 5px; letter-spacing: 0.08em; }
  .stc-title { font-size: 14px; font-weight: 500; line-height: 1.5; }

  .feeling-hint { font-size: 13px; color: var(--ink-3); line-height: 1.8; margin-bottom: 12px; }
  .feeling-input-wrap { position: relative; }
  .feeling-textarea { width: 100%; background: white; border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px 52px; font-family: var(--sans); font-size: 14px; font-weight: 300; color: var(--ink); outline: none; resize: none; min-height: 130px; line-height: 1.7; transition: border-color 0.2s; }
  .feeling-textarea:focus { border-color: var(--accent); }
  .feeling-textarea.recording { border-color: #e53935; box-shadow: 0 0 0 2px rgba(229,57,53,0.1); }
  .voice-bar { position: absolute; bottom: 0; left: 0; right: 0; padding: 9px 12px; background: rgba(255,255,255,0.96); border-top: 1px solid var(--border); border-radius: 0 0 8px 8px; display: flex; align-items: center; gap: 10px; }
  .btn-voice { background: none; border: none; cursor: pointer; display: flex; align-items: center; gap: 7px; font-family: var(--sans); font-size: 12px; color: var(--ink-3); transition: color 0.2s; padding: 3px 0; }
  .btn-voice:hover { color: var(--ink-2); }
  .btn-voice.active { color: #e53935; }
  .voice-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; flex-shrink: 0; transition: transform 0.2s; }
  .btn-voice.active .voice-dot { animation: pulse-dot 0.9s ease-in-out infinite; }
  @keyframes pulse-dot { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.6; } }
  .voice-tip { font-size: 11px; color: var(--ink-3); }
  .voice-no-support { font-size: 11px; color: var(--ink-3); }

  .btn-generate { width: 100%; background: var(--accent); color: white; border: none; border-radius: 8px; padding: 14px; font-family: var(--sans); font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 14px; transition: opacity 0.2s; }
  .btn-generate:hover { opacity: 0.88; }
  .btn-generate:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-back-topics { background: none; border: none; font-family: var(--sans); font-size: 13px; color: var(--ink-3); cursor: pointer; margin-top: 8px; width: 100%; padding: 8px; transition: color 0.2s; }
  .btn-back-topics:hover { color: var(--ink); }

  /* Script section */
  .script-section { animation: fadeUp 0.35s ease; }
  .script-card { background: white; border: 1px solid var(--border); border-radius: 10px; margin-bottom: 10px; overflow: hidden; }
  .script-card-head { display: flex; align-items: center; justify-content: space-between; padding: 9px 14px; border-bottom: 1px solid var(--border); background: var(--paper); }
  .script-label-wrap { display: flex; align-items: center; gap: 8px; }
  .script-time { font-size: 11px; color: var(--ink-3); }
  .script-label { font-size: 11px; font-weight: 500; letter-spacing: 0.05em; padding: 3px 9px; border-radius: 20px; }
  .sl-hook    { background: #fff3e0; color: #e65100; }
  .sl-empathy { background: #e3f2fd; color: #1565c0; }
  .sl-topic   { background: #fce4ec; color: #880e4f; }
  .sl-story   { background: #e8f5e9; color: #1b5e20; }
  .sl-insight { background: #ede7f6; color: #4527a0; }
  .sl-closing { background: #fff8e1; color: #f57f17; }
  .btn-copy-section { font-size: 11px; color: var(--ink-3); background: none; border: 1px solid var(--border); border-radius: 4px; padding: 3px 8px; cursor: pointer; font-family: var(--sans); transition: all 0.2s; }
  .btn-copy-section:hover { color: var(--accent); border-color: var(--accent); }
  .script-content { padding: 13px 14px; font-size: 14px; line-height: 1.9; color: var(--ink); white-space: pre-wrap; }

  .script-actions { margin-top: 14px; display: flex; flex-direction: column; gap: 8px; }
  .btn-copy-all { background: var(--accent); color: white; border: none; border-radius: 8px; padding: 13px; font-family: var(--sans); font-size: 14px; font-weight: 500; cursor: pointer; transition: opacity 0.2s; }
  .btn-copy-all:hover { opacity: 0.88; }
  .btn-another { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 13px; font-family: var(--sans); font-size: 14px; color: var(--ink-2); cursor: pointer; transition: all 0.2s; }
  .btn-another:hover { border-color: var(--accent); color: var(--accent); }

  /* Loading overlay */
  .loading-overlay { text-align: center; padding: 3rem 1rem; }
  .spinner { width: 28px; height: 28px; border: 2px solid var(--paper-2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-family: var(--serif); font-size: 16px; color: var(--ink-2); margin-bottom: 5px; }
  .loading-sub { font-size: 12px; color: var(--ink-3); }

  /* Error */
  .error-box { background: #fff5f5; border: 1px solid #ffcdd2; border-radius: 10px; padding: 14px 16px; font-size: 13px; color: #c62828; line-height: 1.7; margin-bottom: 12px; }
  .btn-retry { width: 100%; border: 1px solid var(--border); background: none; border-radius: 8px; padding: 11px; font-family: var(--sans); font-size: 13px; cursor: pointer; color: var(--ink-2); transition: all 0.2s; }
  .btn-retry:hover { border-color: var(--accent); color: var(--accent); }

  .hidden { display: none !important; }

  @media (max-width: 480px) {
    .header { padding: 1.5rem 1.25rem 1rem; }
    .main { padding: 1.25rem 1.25rem 5rem; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-eyebrow">内容创作</div>
    <h1>今日内容创作</h1>
    <div class="header-date" id="header-date"></div>
  </div>
  <div style="display:flex;gap:8px;align-items:flex-start;">
    <a href="ip-tool.html" class="back-link">IP 梳理</a>
    <a href="feedback.html" class="back-link feedback-link">📝 反馈建议</a>
  </div>
</div>

<div class="main">

  <!-- IP 档案卡片 -->
  <div id="ip-section"></div>

  <!-- 热点话题 -->
  <div id="news-section">
    <div class="section-head">
      <div>
        <div class="section-title">今日热点话题</div>
        <div class="section-sub">根据你的 IP 精选，选一条最有感觉的</div>
      </div>
      <button class="btn-refresh" id="btn-refresh" onclick="fetchNews()">换一批</button>
    </div>
    <div class="news-grid" id="news-content"><div style="color:#aaa;font-size:13px;padding:16px 0;">点击右上角「换一批」获取今日话题</div></div>
  </div>

  <!-- 感受输入 -->
  <div id="feeling-section" class="hidden feeling-section">
    <div class="section-head">
      <div>
        <div class="section-title">你的感受</div>
        <div class="section-sub">说真心话，越真实越有力量</div>
      </div>
    </div>
    <div class="selected-topic-card">
      <div class="stc-label">你选的话题</div>
      <div class="stc-title" id="selected-topic-title"></div>
    </div>
    <p class="feeling-hint">看到这条话题，你第一反应是什么？<br>联想到的经历、你的立场、一个情绪……都可以。不用完整，说人话。</p>
    <div class="feeling-input-wrap">
      <textarea class="feeling-textarea" id="feeling-input"
        placeholder="比如：看到这个我想到了自己三年前……&#10;或者我一直觉得这件事……&#10;或者这让我想起一个客户……"
        oninput="checkFeelingInput()"></textarea>
      <div class="voice-bar" id="voice-bar">
        <button class="btn-voice" id="btn-voice" onclick="toggleVoice()">
          <span class="voice-dot"></span>
          <span id="voice-label">语音输入</span>
        </button>
        <span id="voice-tip" class="voice-tip">点击用语音说感受</span>
      </div>
    </div>
    <button class="btn-generate" id="btn-generate" disabled onclick="generateScript()">生成今日文案 ✦</button>
    <button class="btn-back-topics" onclick="backToNews()">← 换一条话题</button>
  </div>

  <!-- 文案结果 -->
  <div id="script-section" class="hidden script-section">
    <div class="section-head">
      <div>
        <div class="section-title">今日视频文案</div>
        <div class="section-sub">约 60 秒口播，可直接使用或微调</div>
      </div>
    </div>
    <div id="script-content"></div>
    <div class="script-actions">
      <button class="btn-copy-all" onclick="copyAll()">复制完整文案</button>
      <button class="btn-another" onclick="startOver()">重新选话题，再写一条</button>
    </div>
  </div>

</div>

<script src="config.js"></script>
<script>
// 通义代理：阿里云 FC（国内直连 DashScope，速度更快）
const QWEN_URL = 'https://nutrition-api-xfwnyqpxkc.cn-hangzhou.fcapp.run'; // 阿里云 FC 杭州，大陆直连
const QWEN_KEY = '';   // key 存在 Vercel 环境变量里，前端不需要
const QWEN_MODEL = 'qwen-turbo';

let ipData = null;
let newsTopics = [];
let selectedTopicIndex = -1;
let isRecording = false;
let recognition = null;
let confirmedText = '';
let currentScript = null;

const SCRIPT_SECTIONS = [
  { key: 'hook',    label: '圈人群开场', time: '0–3 秒',   cls: 'sl-hook',    tip: '让目标人群第一秒停下来' },
  { key: 'pain',   label: '痛点共鸣',   time: '3–12 秒',  cls: 'sl-empathy', tip: '说出她们心里的话' },
  { key: 'value',  label: '利益前置',   time: '12–20 秒', cls: 'sl-topic',   tip: '告诉她看完能得到什么' },
  { key: 'story',  label: '为什么是我', time: '20–40 秒', cls: 'sl-story',   tip: '背书 + 真实经历（活人感）' },
  { key: 'tips',   label: '干货',       time: '40–55 秒', cls: 'sl-insight', tip: '1–3个具体可用的点' },
  { key: 'hook2',  label: '互动钩子',   time: '55–60 秒', cls: 'sl-closing', tip: '金句收尾 + 引流/评论引导' },
];

// ── Init ─────────────────────────────────────────────────────────────────────

(function init() {
  const now = new Date();
  const wd = ['日','一','二','三','四','五','六'];
  document.getElementById('header-date').textContent =
    `${now.getMonth()+1} 月 ${now.getDate()} 日  星期${wd[now.getDay()]}`;

  loadIPSection();
  // fetchNews() 不再自动执行，避免挂起 XHR 干扰后续点击
  initSpeech();
})();

// ── IP Section ───────────────────────────────────────────────────────────────

function loadIPSection() {
  const el = document.getElementById('ip-section');
  const stored = localStorage.getItem('ip_profile');
  if (stored) {
    try {
      ipData = JSON.parse(stored);
      const name = ipData.answers?.name || '你';
      const pos  = ipData.result?.positioning || '';
      const tags = ipData.result?.tags || [];
      el.innerHTML = `
        <div class="ip-mini-card">
          <div class="ip-mini-header" onclick="toggleIPBody()">
            <div>
              <div class="ip-mini-label">IP 档案</div>
              <div class="ip-mini-name">${esc(name)}</div>
            </div>
            <span class="ip-mini-toggle" id="ip-toggle">展开 ↓</span>
          </div>
          <div class="ip-mini-body" id="ip-mini-body">
            <div class="ip-mini-pos">${esc(pos)}</div>
            <div class="ip-mini-tags">${tags.map(t=>`<span class="ip-mini-tag">${esc(t)}</span>`).join('')}</div>
          </div>
        </div>`;
      return;
    } catch(e) {}
  }
  // No IP
  ipData = { manualMode: true, manual: '' };
  el.innerHTML = `
    <div class="no-ip-notice">
      还没有 IP 档案。<a href="ip-tool.html">先去做个 IP 梳理</a>，生成内容会更贴合你。<br>
      或者简单描述一下你是谁：
      <label class="no-ip-label">你的 IP 定位（一两句话）</label>
      <textarea class="no-ip-textarea" id="manual-ip"
        placeholder="例：我是两个孩子的宝妈，安利顾问，帮助宝妈在照顾家人的同时照顾好自己……"
        oninput="updateManualIP()"></textarea>
    </div>`;
}

function toggleIPBody() {
  const body   = document.getElementById('ip-mini-body');
  const toggle = document.getElementById('ip-toggle');
  const open   = body.classList.toggle('open');
  toggle.textContent = open ? '收起 ↑' : '展开 ↓';
}

function updateManualIP() {
  if (ipData) ipData.manual = document.getElementById('manual-ip')?.value?.trim() || '';
}

function getIPSummary() {
  if (!ipData) return '健康领域内容创作者';
  if (ipData.manualMode) return ipData.manual || '健康领域内容创作者';
  const a = ipData.answers || {};
  const r = ipData.result  || {};
  return [
    r.positioning || '',
    a.core_value  ? `核心价值：${a.core_value}` : '',
    a.traits      ? `个人特质：${a.traits}`      : '',
    r.tags?.length ? `标签：${r.tags.join('、')}` : '',
  ].filter(Boolean).join('\n');
}

function getIPDetails() {
  if (!ipData || ipData.manualMode) {
    return ipData?.manual || '健康领域内容创作者';
  }
  const a = ipData.answers || {};
  const r = ipData.result  || {};
  return [
    `定位：${r.positioning || ''}`,
    `核心价值：${a.core_value || ''}`,
    `个人特质：${a.traits || ''}`,
    `个人经历转变：${a.transformation || ''}`,
    `说话风格：${a.how_talk || ''}`,
    `最不想被认为：${a.not_want || ''}`,
    `标签：${(r.tags||[]).join('、')}`,
  ].filter(s => !s.endsWith('：')).join('\n');
}

/* 抓取实时热榜关键词（微博热搜，失败静默） */
async function fetchTrending() {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 4000); // 硬超时 4 秒
  try {
    const res = await fetch('https://api.vvhan.com/api/hotlist?type=wbhot', {
      signal: controller.signal
    });
    clearTimeout(timer);
    const data = await res.json();
    if (data.success && Array.isArray(data.data) && data.data.length) {
      return data.data.slice(0, 20).map(i => i.title).filter(Boolean);
    }
  } catch(e) {
    clearTimeout(timer);
  }
  return null;
}

let lastTrendingKeywords = null; // 缓存热榜词

/* 后台悄悄抓热榜，绝不阻塞主流程 */
function prefetchTrending() {
  if (lastTrendingKeywords) return;
  fetchTrending().then(kw => {
    if (kw && kw.length) {
      lastTrendingKeywords = kw;
      // 更新副标题角标（如果新闻区还在显示）
      const sub = document.querySelector('#news-section .section-sub');
      if (sub) sub.innerHTML = `已接入实时热榜 <span class="news-realtime-tag"><span class="news-realtime-dot"></span>实时</span>`;
    }
  }).catch(() => {});
}

function fetchNews() {
  const btn     = document.getElementById('btn-refresh');
  const content = document.getElementById('news-content');
  btn.disabled  = true;
  content.innerHTML = skeletons(2);

  // 倒计时
  let countdown = 62;
  btn.textContent = 'AI 思考中 ' + countdown + 's';
  const countdownTimer = setInterval(function() {
    countdown--;
    if (countdown > 0) btn.textContent = 'AI 思考中 ' + countdown + 's';
    else btn.textContent = '即将完成…';
  }, 1000);

  let finished = false;
  function showError(msg) {
    if (finished) return;
    finished = true;
    clearInterval(countdownTimer);
    content.innerHTML = '<div style="padding:16px;background:#fff3f3;border:1px solid #fcc;border-radius:12px;color:#c00;margin-bottom:12px;"><div style="font-weight:600;margin-bottom:8px;">❌ 话题获取失败</div><div style="font-size:13px;color:#555;word-break:break-all;">' + msg + '</div></div><button onclick="fetchNews()" style="padding:10px 24px;background:#c4621a;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;">重试</button>';
    btn.disabled = false;
    btn.textContent = '换一批';
  }
  // 保底超时 65 秒
  const forceTimeoutId = setTimeout(function() { showError('请求超时，请点重试'); }, 65000);

  prefetchTrending();

  const trendingBlock = lastTrendingKeywords
    ? '\n参考热榜词（借势用）：' + lastTrendingKeywords.slice(0,10).join('、')
    : '';

  const sectionSub = document.querySelector('#news-section .section-sub');
  if (sectionSub && !lastTrendingKeywords) sectionSub.textContent = '根据你的 IP 智能推荐';

  const today = new Date().toLocaleDateString('zh-CN', { month:'long', day:'numeric', weekday:'long' });

  const prompt = '你是微信视频号健康类内容策略师。今天' + today + '。\n创作者：' + getIPSummary() + trendingBlock + '\n\n推荐3个视频话题（情绪共鸣1个、实用干货1个、热点借势1个），每个含：type_name、title（15字内）、why_hot（20字内）、audience（10字内）、angle（15字内）、outline（3条各10字内的数组）、hook_example（15字内不用大家好）。\n\n纯JSON，不加任何说明文字：{"topics":[{"type":"A","type_name":"","title":"","why_hot":"","audience":"","angle":"","outline":["","",""],"hook_example":""}]}';

  var fetchBody = JSON.stringify({ model: QWEN_MODEL, messages: [{ role:'user', content:prompt }], max_tokens: 1200 });
  var xhr = new XMLHttpRequest();
  xhr.open('POST', QWEN_URL, true);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.timeout = 60000;
  xhr.onload = function() {
    if (finished) return;
    if (xhr.status < 200 || xhr.status >= 300) { showError('HTTP ' + xhr.status); return; }
    var data;
    try { data = JSON.parse(xhr.responseText); } catch(e) { showError('格式错误，请重试'); return; }
    if (data.error) { showError('API错误: ' + JSON.stringify(data.error)); return; }
    if (data.code && !data.choices) { showError('错误: ' + data.code); return; }
    var text = (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content)
      || (data.content && data.content[0] && data.content[0].text) || '';
    if (!text.trim()) { showError('返回内容为空，请重试'); return; }
    var jsonMatch = text.match(/\{[\s\S]*\}/);
    if (!jsonMatch) { showError('格式错误，请重试'); return; }
    var result;
    try { result = JSON.parse(jsonMatch[0]); } catch(e) { showError('格式错误，请重试'); return; }
    newsTopics = result.topics || [];
    if (!finished) {
      finished = true;
      clearTimeout(forceTimeoutId);
      clearInterval(countdownTimer);
      btn.disabled = false;
      btn.textContent = '换一批';
      renderNews();
    }
  };
  xhr.onerror = function() { if (!finished) showError('网络错误，请重试'); };
  xhr.ontimeout = function() { if (!finished) showError('请求超时，请点重试'); };
  xhr.send(fetchBody);
}

// ── Voice Recognition ─────────────────────────────────────────────────────────

function initSpeech() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    document.getElementById('voice-bar').innerHTML =
      '<span class="voice-no-support">当前浏览器不支持语音输入（推荐 Chrome），请直接文字输入</span>';
    return;
  }

  recognition = new SR();
  recognition.lang = 'zh-CN';
  recognition.continuous = true;
  recognition.interimResults = true;

  recognition.onresult = e => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) confirmedText += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    document.getElementById('feeling-input').value = confirmedText + interim;
    checkFeelingInput();
  };

  recognition.onend = () => {
    if (isRecording) {
      try { recognition.start(); } catch(err) {}
    }
  };

  recognition.onerror = e => {
    if (e.error !== 'aborted' && e.error !== 'no-speech') stopRecording();
  };
}

function toggleVoice() {
  isRecording ? stopRecording() : startRecording();
}

function startRecording() {
  if (!recognition) return;
  confirmedText = document.getElementById('feeling-input').value.trim();
  if (confirmedText) confirmedText += '，';
  try {
    recognition.start();
    isRecording = true;
    document.getElementById('btn-voice').classList.add('active');
    document.getElementById('voice-label').textContent = '停止录音';
    document.getElementById('voice-tip').textContent   = '录音中，再次点击停止…';
    document.getElementById('feeling-input').classList.add('recording');
  } catch(e) {}
}

function stopRecording() {
  isRecording = false;
  try { recognition?.stop(); } catch(e) {}
  confirmedText = document.getElementById('feeling-input').value.trim();
  document.getElementById('btn-voice').classList.remove('active');
  document.getElementById('voice-label').textContent = '语音输入';
  document.getElementById('voice-tip').textContent   = '点击用语音说感受';
  document.getElementById('feeling-input').classList.remove('recording');
  checkFeelingInput();
}

    </div>`;
  window.scrollTo({ top: 0, behavior: 'smooth' });

  const prompt = `你是大健康赛道顶尖商业IP文案操盘手。你深刻理解：商业IP的短视频不是为了流量，是为了引来精准人群。每一条视频都必须让目标人群清楚地知道「这是说我的 → 她懂我 → 她有资格说 → 我要找她」。

━━━ 创作者商业IP档案 ━━━
${getIPDetails()}

━━━ 今日借势话题 ━━━
话题：${topic.title}
背景：${topic.why_hot || topic.summary || ''}
建议切入角度：${topic.angle}

━━━ 创作者此刻的真实感受（文案的灵魂，必须自然融入） ━━━
${feeling}

━━━ 写作任务 ━━━
写一条 60 秒商业IP口播文案，严格按以下 6 段结构：

━ 第1段【圈人群开场】0–3秒，15–20字 ━
生死线。让目标人群第1秒就停下来，同时圈出「这条视频是给谁看的」。
从以下4种钩子选1种，选最适合这条内容的：
① 场景代入：直接说目标人群今天或近期经历的具体场景
   例："每天喝够水、认真睡觉，为什么就是瘦不下来？"
② 反常识：说出一个大家以为对但其实有偏差的认知
   例："越努力控制饮食，反而越难瘦？这不是你的错。"
③ 悬念提问：抛出一个让目标人群忍不住想知道答案的问题
   例："同样40岁，为什么有人越来越有活力，有人越来越垮？"
④ 数字+结果：具体数字+反差感制造冲击
   例："我帮过200多个姐妹恢复状态，发现了同一个原因。"
——绝对禁止"大家好/今天给大家/我来分享/欢迎来到"开头——

━ 第2段【痛点共鸣】3–12秒，50–70字 ━
不介绍自己。直接把目标人群内心最憋屈、最无力的那个感受说出来。
说到她心里去，让她感觉「这个人完全懂我的状态」。
参考句式：「是不是经常…」「你有没有那种感觉…」「我知道很多人都…」
⚠️ 严禁：第2段和第1段说同一件事，必须深入一层或换一个维度。

━ 第3段【利益前置】12–20秒，40–60字 ━
这段回答「她看这条视频能得到什么」。
自然带入今日话题，同时明确告诉观众：看完这条视频你会得到一个什么。
要有承诺感，但不夸张。例："今天我就想说说这件事，说完你可能会改变一个习惯。"

━ 第4段【为什么是我】20–40秒，100–130字 ━
这段建立信任。结构：背书（一句话说清凭什么是你来讲）+ 真实故事（把创作者的感受和经历编进来）。
背书不是吹嘘，是真实经历和身份——「我做了X年」「我自己从这样到这样」「我有多少学员…」
故事要有具体细节（时间/场景/一句真实对话）。说「我当时……」「有一次……」，像对闺蜜说话。
活人感>完美感。

━ 第5段【干货1–3点】40–55秒，70–100字 ━
给出1–3个具体实用的点，但不要「首先其次然后」式列清单。
像朋友分享自己踩过坑后悟到的事：「我后来发现……」「现在我每天做的一件事就是……」
接地气，说人话，不装专家，不说「科学证明」类正式用语。
⚠️ 严禁常识性废话：「多喝水」「早睡早起」「少看手机」「保持好心情」这类人人都知道的话一律不能写，必须是有反差感或具体可操作的信息。

━ 第6段【互动钩子】55–60秒，20–35字 ━
结尾要做3件事之一（选最合适的）：
① 留悬念：「下一条我要说说…你会感兴趣」→引发关注
② 引发评论：提一个让人想在评论区回答的问题
③ 轻植入引流：自然提到她有资源/方案，留到私域，不硬卖
禁止：「关注我学更多」「点赞收藏转发」这类无聊套话。

━━━ 铁律 ━━━
· 禁用词：赋能/蜕变/绽放/逆袭/裂变/焕新/内卷/躺平/宝子/绝绝子/满满
· 不做疗效承诺，不说「治/治愈/修复/调理」等医疗用语，不指向产品
· 6段浑然一体，口语连贯，像一个真人在说话
· 整条文案读下来，要能让陌生人看完觉得：这个人靠谱，我想了解她

严格输出纯 JSON，不要 markdown 代码块，不要任何解释：
{
  "hook":  "第1段完整文字",
  "pain":  "第2段完整文字",
  "value": "第3段完整文字",
  "story": "第4段完整文字",
  "tips":  "第5段完整文字",
  "hook2": "第6段完整文字"
}`;

  const scriptEl = document.getElementById('script-content');

  // 强制超时（同样不依赖 Promise 机制）
  let scriptDone = false;
  function showScriptError(msg) {
    if (scriptDone) return;
    scriptDone = true;
    scriptEl.innerHTML = `
      <div style="padding:16px;background:#fff3f3;border:1px solid #fcc;border-radius:12px;color:#c00;margin-bottom:12px;">
        <div style="font-weight:600;margin-bottom:6px;">❌ 生成遇到问题</div>
        <div style="font-size:13px;color:#666;word-break:break-all;">${msg}</div>
      </div>
      <button class="btn-retry" onclick="retryScript()">← 返回重试</button>`;
  }
  const scriptTimeoutId = setTimeout(() => showScriptError('请求超时，请返回重试'), 50000);

  try {
    const res = await fetch(QWEN_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: QWEN_MODEL, messages: [{ role:'user', content:prompt }], max_tokens: 2000 })
    });
    if (scriptDone) return;
    if (!res.ok) { showScriptError('HTTP ' + res.status); return; }
    const data = await res.json();
    if (scriptDone) return;
    if (data.error) { showScriptError('API错误: ' + JSON.stringify(data.error)); return; }
    if (data.code && !data.choices) { showScriptError('DashScope错误 ' + data.code + ': ' + (data.message || '')); return; }
    const text = data.choices?.[0]?.message?.content || data.content?.[0]?.text || '';
    if (!text.trim()) { showScriptError('返回内容为空: ' + JSON.stringify(data).slice(0, 200)); return; }
    const jsonMatch2 = text.match(/\{[\s\S]*\}/);
    if (!jsonMatch2) { showScriptError('格式错误，请重试'); return; }
    currentScript = JSON.parse(jsonMatch2[0]);
    if (!scriptDone) {
      scriptDone = true;
      clearTimeout(scriptTimeoutId);
      renderScript(currentScript);
    }
  } catch(e) {
    showScriptError(e.message || '未知错误');
  }
}

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Utils ─────────────────────────────────────────────────────────────────────

function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
</script>
